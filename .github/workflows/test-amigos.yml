name: Test Amigos Connection

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    name: Test GitHub ↔ Claude Communication
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Amigos Test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/test_amigos.py
