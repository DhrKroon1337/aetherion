name: Claude Amigo Leercoach

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-reageert:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Laad leerprofiel en reageer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENTER: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          # Leesprofiel uit config
          with open("config/leerproces.json") as f:
              leer_config = json.load(f)

          actief        = leer_config["actief_profiel"]
          profiel       = leer_config["leerprofielen"][actief]
          model_id      = profiel["model_id"]
          max_tokens    = profiel["max_tokens"]
          systeem_prompt = profiel["systeem_prompt"]

          issue_title  = os.environ.get("ISSUE_TITLE", "")
          issue_body   = os.environ.get("ISSUE_BODY", "")
          issue_number = os.environ.get("ISSUE_NUMBER", "")
          comment_body = os.environ.get("COMMENT_BODY", "")
          commenter    = os.environ.get("COMMENTER", "")
          repo         = os.environ.get("GITHUB_REPOSITORY", "")
          token        = os.environ["GITHUB_TOKEN"]
          api_key      = os.environ["ANTHROPIC_API_KEY"]

          if comment_body and commenter != "github-actions[bot]":
              prompt = (
                  f"Issue: {issue_title}\n"
                  f"Vraag van {commenter}: {comment_body}"
              )
          else:
              prompt = (
                  f"Nieuw leervraag:\nTitel: {issue_title}\n"
                  f"Beschrijving: {issue_body}"
              )

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps({
                  "model": model_id,
                  "max_tokens": max_tokens,
                  "system": systeem_prompt,
                  "messages": [{"role": "user", "content": prompt}]
              }).encode(),
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )
          resp = json.loads(urllib.request.urlopen(req).read())
          antwoord = resp["content"][0]["text"]

          niveau_label = f"Niveau {profiel['niveau']} — {actief}"
          comment_url = (
              f"https://api.github.com/repos/{repo}/issues/{issue_number}/comments"
          )
          comment_req = urllib.request.Request(
              comment_url,
              data=json.dumps({
                  "body": (
                      f"**Leercoach ({niveau_label} | `{model_id}`):**\n\n"
                      f"{antwoord}"
                  )
              }).encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              }
          )
          urllib.request.urlopen(comment_req)
          print(f"Gereageerd op issue #{issue_number} via profiel '{actief}' ({model_id})")
          EOF
